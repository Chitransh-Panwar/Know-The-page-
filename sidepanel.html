<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Know the Page</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #fff; color: #111; padding: 16px; min-width: 300px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
    .header h1 { font-size: 16px; font-weight: 500; }
    #clear-btn { font-size: 12px; padding: 4px 10px; border: 1px solid #ddd; border-radius: 8px; background: transparent; color: #666; cursor: pointer; }
    #clear-btn:hover { background: #f5f5f5; }
    #chat-history {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
    min-height: 40px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    }
    .msg { padding: 10px 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 90%; }
    .msg.user { background: #dbeafe; color: #1e40af; align-self: flex-end; }
    .msg.assistant { background: #f5f5f5; color: #111; align-self: flex-start; border: 1px solid #eee; }
    .msg.thinking { color: #999; font-style: italic; font-size: 13px; align-self: flex-start; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    #question { flex: 1; padding: 8px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; }
    #send { padding: 8px 14px; border-radius: 12px; border: 1px solid #ddd; background: transparent; cursor: pointer; font-size: 16px; }
    #send:hover { background: #f5f5f5; }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌐 Know the Page</h1>
    <button id="clear-btn">↺ New session</button>
  </div>
  <div id="chat-history">
    <div class="msg assistant">Ask me anything about this page or youtube video!</div>
  </div>
  <div class="input-row">
    <input type="text" id="question" placeholder="Ask a question..." autocomplete="off" />
    <button id="send">➤</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
